# Render Blueprint — deploy BrightPath with one click ("New > Blueprint" in Render)
services:
  - type: web
    name: brightpath-tutor
    runtime: node
    plan: starter            # $7/mo — needed for the persistent disk (database)
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    disk:
      name: brightpath-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      # Add these in the Render dashboard when going live with payments:
      # STRIPE_SECRET_KEY, STRIPE_PRICE_SOLO, STRIPE_PRICE_FAMILY, STRIPE_WEBHOOK_SECRET
